# Use this Blueprint to deploy n8n on Render as a web
# service that uses Supabase Postgres to store
# workflow data.
services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    image:
      url: docker.io/n8nio/n8n:latest
    envVars:
      # Do not modify this value after it's generated!
      # If you do, you'll lose access to all credentials
      # encrypted with the previous value.
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      # Supabase Postgres connection
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: db.ycsbagliyruxtkgctykj.supabase.co
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        value: postgres
      - key: DB_POSTGRESDB_USER
        value: postgres
      - key: DB_POSTGRESDB_PASSWORD
        value: 4XKtZIAgIlwZ&!39
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: true
      # n8n host config
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: GENERIC_TIMEZONE
        value: America/New_York
      # Keep-alive (prevents Render free tier cold starts)
      - key: N8N_RUNNERS_ENABLED
        value: true
